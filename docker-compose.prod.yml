services:
  backend:
    image: ${ACR_REGISTRY}/ai-stock-advisor/stock-backend:${APP_IMAGE_TAG:-latest}
    container_name: stock_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 800m
    cpus: "1.0"
    pids_limit: 256
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    image: ${ACR_REGISTRY}/ai-stock-advisor/stock-frontend:${APP_IMAGE_TAG:-latest}
    container_name: stock_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    mem_limit: 350m
    cpus: "0.50"
    pids_limit: 128
