services:
  # ========================================
  # 核心业务服务 (Core Services)
  # ========================================
  
  # 数据库: PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: stock_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_advisor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 不暴露到外部，只允许 Docker 内部访问（更安全）

  # 缓存: Redis
  redis:
    image: redis:7-alpine
    container_name: stock_redis
    restart: always    # 启用 AOF 持久化 + 每 60 秒至少 1 次写入时触发 RDB 快照
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M    # 不暴露到外部，只允许 Docker 内部访问

  # 后端服务
  backend:
    build: ./backend
    container_name: stock_backend
    restart: always
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_advisor}
      - REDIS_URL=redis://redis:6379/0
      - LOG_FORMAT=${LOG_FORMAT:-standard}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - app_logs:/var/log/app
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,environment"

  # 前端服务
  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: stock_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # 日志聚合服务 (Logging Stack - 可选)
  # 启动方式: docker compose --profile logging up -d
  # ========================================

  # Loki: 日志聚合存储
  loki:
    image: grafana/loki:2.9.3
    container_name: stock_loki
    restart: always
    profiles:
      - logging
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Promtail: 日志采集代理
  promtail:
    image: grafana/promtail:2.9.3
    container_name: stock_promtail
    restart: always
    profiles:
      - logging
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - app_logs:/var/log/app:ro
      - promtail_positions:/tmp
    depends_on:
      loki:
        condition: service_healthy

  # Grafana: 日志可视化面板
  grafana:
    image: grafana/grafana:10.2.3
    container_name: stock_grafana
    restart: always
    profiles:
      - logging
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-clock-panel
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - loki

volumes:
  postgres_data:
  redis_data:
  loki_data:
  promtail_positions:
  grafana_data:
  app_logs:
