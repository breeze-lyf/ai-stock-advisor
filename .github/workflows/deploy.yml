name: Build And Deploy (Docker Pull Mode)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ghcr_owner: ${{ steps.meta.outputs.ghcr_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Image Meta
        id: meta
        run: |
          set -euo pipefail
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.ACR_REGISTRY }}/ai-stock-advisor/stock-backend:${{ steps.meta.outputs.image_tag }},${{ secrets.ACR_REGISTRY }}/ai-stock-advisor/stock-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: ${{ secrets.ACR_REGISTRY }}/ai-stock-advisor/stock-frontend:${{ steps.meta.outputs.image_tag }},${{ secrets.ACR_REGISTRY }}/ai-stock-advisor/stock-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy To Aliyun SWA
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload Deploy Assets To Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,scripts/deploy_compose_prod.sh"
          target: "/root/ai-stock-advisor"
          rm: false

      - name: Deploy On Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /root/ai-stock-advisor
            mkdir -p backend

            # Login to Aliyun ACR
            echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin
            
            export ACR_REGISTRY="${{ secrets.ACR_REGISTRY }}"
            export APP_IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            
            bash ./scripts/deploy_compose_prod.sh
            docker image prune -f
