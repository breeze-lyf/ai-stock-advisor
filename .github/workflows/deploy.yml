name: Build And Deploy (Docker Pull Mode)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ghcr_owner: ${{ steps.meta.outputs.ghcr_owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Image Meta
        id: meta
        run: |
          set -euo pipefail
          OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "ghcr_owner=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set Up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login To GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build And Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.ghcr_owner }}/ai-stock-advisor-backend:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.ghcr_owner }}/ai-stock-advisor-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build And Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.ghcr_owner }}/ai-stock-advisor-frontend:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.ghcr_owner }}/ai-stock-advisor-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug Workspace
        run: ls -R

      - name: Upload Deploy Assets To Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml,scripts/deploy_compose_prod.sh"
          target: "/root/ai-stock-advisor"
          rm: false

      - name: Deploy On Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /root/ai-stock-advisor
            mkdir -p backend

            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            export GHCR_OWNER="${{ needs.build-and-push.outputs.ghcr_owner }}"
            export APP_IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            bash ./scripts/deploy_compose_prod.sh
            docker image prune -f
