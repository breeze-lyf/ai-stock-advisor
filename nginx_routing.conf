# Nginx 配置方案 - 域名备案分流

# 1. 根域名配置 (yufeng.fun) -> 指向博客壳
server {
    listen 80;
    server_name yufeng.fun www.yufeng.fun;

    # 备案期间及后续抽查建议首页展示博客
    location / {
        root /var/www/shell-blog;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# 2. 子域名配置 (stock.yufeng.fun) -> 指向原 AI 股票系统
server {
    listen 80;
    server_name stock.yufeng.fun;

    # 前端静态文件 (Next.js 编译后的成果)
    location / {
        proxy_pass http://127.0.0.1:3000; # 使用 IP 避免解析延迟或 IPv6 冲突
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 后端 API (FastAPI)
    location /api {
        proxy_pass http://127.0.0.1:8000; # 使用 IP 避免解析延迟或 IPv6 冲突
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 注：如果你已经有了 SSL 证书（备案通过后申请），请记得增加 443 端口的监听并配置证书路径。
