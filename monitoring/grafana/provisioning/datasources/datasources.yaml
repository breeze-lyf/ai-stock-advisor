# Grafana 数据源自动配置 (Grafana Datasource Provisioning)
# Loki 日志数据源

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        # 关联Trace ID到Jaeger (可选)
        - name: TraceID
          matcherRegex: '"traceId":"(\w+)"'
          url: '$${__value.raw}'
          datasource: Jaeger
